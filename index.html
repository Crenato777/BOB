<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pose Detector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --accent: #7c6bff;
      --accent2: #ff6b9d;
      --accent3: #6bffd4;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --border: rgba(124, 107, 255, 0.15);
      --glow: rgba(124, 107, 255, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,107,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,107,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      padding: 2rem 1rem 4rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .badge-pill {
      display: inline-block;
      background: rgba(124,107,255,0.12);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.5rem;
    }

    /* Card */
    .card-dark {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .card-dark::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      border-radius: 20px 20px 0 0;
    }

    /* Camera button */
    .btn-camera {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 14px;
      padding: 0.85rem 2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px var(--glow), 0 4px 20px rgba(0,0,0,0.4);
      overflow: hidden;
      letter-spacing: 0.02em;
    }

    .btn-camera::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      border-radius: inherit;
    }

    .btn-camera:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px var(--glow), 0 8px 30px rgba(0,0,0,0.5);
    }

    .btn-camera:active { transform: translateY(0); }

    .btn-camera:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-camera .cam-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .btn-camera .pulse-ring {
      position: absolute;
      right: 14px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      animation: none;
    }

    .btn-camera.running .pulse-ring {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(1); opacity: 1; }
      50%  { transform: scale(1.6); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Canvas container */
    .canvas-wrap {
      position: relative;
      display: inline-block;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(124,107,255,0.1);
    }

    #canvas {
      display: block;
      width: 100%;
      max-width: 320px;
      height: auto;
      border-radius: 16px;
    }

    .canvas-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,15,0.85);
      border-radius: 16px;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .canvas-overlay.hidden { opacity: 0; }

    .overlay-icon {
      width: 48px;
      height: 48px;
      opacity: 0.3;
      margin-bottom: 0.75rem;
    }

    .overlay-text {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* Label / progress section */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    #label-container { display: flex; flex-direction: column; gap: 0.9rem; }

    .class-item {}

    .class-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .class-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
    }

    .class-pct {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--accent);
      min-width: 42px;
      text-align: right;
      transition: color 0.3s;
    }

    .progress-track {
      height: 8px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 100px;
      width: 0%;
      transition: width 0.25s ease, background 0.3s;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 20px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
      border-radius: 100px;
    }

    /* High confidence highlight */
    .class-item.top .class-pct { color: var(--accent3); }
    .class-item.top .progress-fill {
      background: linear-gradient(90deg, var(--accent), var(--accent3));
    }

    /* Status dot */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-dot.active {
      background: var(--accent3);
      box-shadow: 0 0 6px var(--accent3);
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    /* Responsive canvas size */
    @media (max-width: 576px) {
      #canvas { max-width: 100%; }
    }
  </style>
</head>
<body>
<div class="wrapper container">

  <!-- Header -->
  <div class="header">
    <div class="badge-pill">Teachable Machine</div>
    <h1>Pose Detector</h1>
    <p class="subtitle">Detecção de pose em tempo real via webcam</p>
  </div>

  <div class="row g-4 justify-content-center">

    <!-- Left: Camera -->
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card-dark h-100 d-flex flex-direction-column">

        <!-- Status + button -->
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-3">
          <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Aguardando início</span>
          </div>
          <button class="btn-camera" id="startBtn" onclick="init()">
            <svg class="cam-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 7l-7 5 7 5V7z"/>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            Ativar Câmera
            <span class="pulse-ring" id="pulseRing"></span>
          </button>
        </div>

        <hr class="divider"/>

        <!-- Canvas -->
        <div class="d-flex justify-content-center">
          <div class="canvas-wrap">
            <canvas id="canvas" width="200" height="200"></canvas>
            <div class="canvas-overlay" id="canvasOverlay">
              <svg class="overlay-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M23 7l-7 5 7 5V7z"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
              </svg>
              <span class="overlay-text">Câmera inativa</span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Right: Predictions -->
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card-dark h-100">
        <p class="section-label">Correspondência por classe</p>
        <div id="label-container">
          <!-- Placeholder bars shown before model loads -->
          <div class="class-item">
            <div class="class-header">
              <span class="class-name" style="color:var(--muted)">—</span>
              <span class="class-pct" style="color:var(--muted)">0%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width:0%;background:var(--surface2)"></div>
            </div>
          </div>
        </div>

        <hr class="divider"/>
        <p style="font-size:0.78rem;color:var(--muted);text-align:center;">
          Inicie a câmera para ver as predições em tempo real.
        </p>
      </div>
    </div>

  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
<script>
  const URL = "https://teachablemachine.withgoogle.com/models/9alTjX7LJ/";
  let model, webcam, ctx, labelContainer, maxPredictions;
  let started = false;

  // Color palette for multiple classes
  const gradients = [
    ['#7c6bff','#ff6b9d'],
    ['#6bffd4','#7c6bff'],
    ['#ff6b9d','#ffb86b'],
    ['#ffb86b','#6bffd4'],
    ['#6bffd4','#ff6b9d'],
  ];

  async function init() {
    if (started) return;
    started = true;

    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerHTML = `
      <svg class="cam-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      Carregando...
      <span class="pulse-ring" id="pulseRing"></span>`;

    document.getElementById('statusText').textContent = 'Carregando modelo...';

    const modelURL    = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmPose.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const size = 320;
    const flip = true;
    webcam = new tmPose.Webcam(size, size, flip);
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    const canvas = document.getElementById("canvas");
    canvas.width  = size;
    canvas.height = size;
    ctx = canvas.getContext("2d");

    // Hide overlay
    document.getElementById('canvasOverlay').classList.add('hidden');

    // Status active
    document.getElementById('statusDot').classList.add('active');
    document.getElementById('statusText').textContent = 'Câmera ativa';

    // Button running state
    btn.disabled = false;
    btn.classList.add('running');
    btn.innerHTML = `
      <svg class="cam-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      Transmitindo
      <span class="pulse-ring running" id="pulseRing"></span>`;

    // Build label rows
    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = '';

    for (let i = 0; i < maxPredictions; i++) {
      const g = gradients[i % gradients.length];
      const item = document.createElement("div");
      item.className = "class-item";
      item.id = `class-item-${i}`;
      item.innerHTML = `
        <div class="class-header">
          <span class="class-name" id="class-name-${i}">Classe ${i+1}</span>
          <span class="class-pct" id="class-pct-${i}" style="color:${g[1]}">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="class-bar-${i}" style="background:linear-gradient(90deg,${g[0]},${g[1]})"></div>
        </div>`;
      labelContainer.appendChild(item);
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
    const prediction = await model.predict(posenetOutput);

    let topIdx = 0;
    let topVal = 0;

    for (let i = 0; i < maxPredictions; i++) {
      const prob = prediction[i].probability;
      if (prob > topVal) { topVal = prob; topIdx = i; }

      const pct = Math.round(prob * 100);
      const nameEl = document.getElementById(`class-name-${i}`);
      const pctEl  = document.getElementById(`class-pct-${i}`);
      const barEl  = document.getElementById(`class-bar-${i}`);
      const item   = document.getElementById(`class-item-${i}`);

      if (nameEl) nameEl.textContent = prediction[i].className;
      if (pctEl)  pctEl.textContent  = pct + '%';
      if (barEl)  barEl.style.width  = pct + '%';
      if (item)   item.classList.remove('top');
    }

    // Highlight top class
    const topItem = document.getElementById(`class-item-${topIdx}`);
    if (topItem) topItem.classList.add('top');

    drawPose(pose);
  }

  function drawPose(pose) {
    if (webcam.canvas) {
      ctx.drawImage(webcam.canvas, 0, 0);
      if (pose) {
        const minConf = 0.5;
        tmPose.drawKeypoints(pose.keypoints, minConf, ctx);
        tmPose.drawSkeleton(pose.keypoints, minConf, ctx);
      }
    }
  }
</script>
</body>
</html>
